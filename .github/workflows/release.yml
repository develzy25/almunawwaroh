name: Build and Release Desktop App

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/release.yml'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write # Dibutuhkan untuk membuat Release dan push commit versi baru

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci || npm install

      - name: Install Web Dependencies
        working-directory: apps/web
        run: npm install

      - name: Bump Version
        working-directory: apps/web
        run: node scripts/bump-version.js

      - name: Configure Git for Version Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/package.json
          git commit -m "chore(release): bump version [skip ci]" || echo "No changes to commit"

      - name: Build and Publish EXE
        working-directory: apps/web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:exe -- --publish always

      - name: Push Version Update
        run: git push origin main
